services:
  app:
    build: .
    container_name: nest_app
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npx prisma db seed && npm run build && node dist/src/main.js"

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: voiceerp
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  prisma-studio:
    image: node:20-alpine
    container_name: prisma_studio
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      - db
    env_file:
      - .env
    command: sh -c "npm install && npx prisma generate && npx prisma studio --port 5555 --browser none"
    ports:
      - "5555:5555"

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
